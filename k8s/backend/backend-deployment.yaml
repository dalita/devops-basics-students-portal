apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: dalita/devops-basics-backend:latest

        ports:
        - containerPort: 5001

        envFrom:
        - configMapRef:
            name: backend-config

        - secretRef:
            name: backend-secret